{% extends 'base.html' %}

{% block content %}
<div class="container py-3">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h3 class="mb-0" style="color: white;">История сессий</h3>
        <div class="d-flex gap-2 align-items-center flex-wrap">
            <select id="session-multi" class="form-select form-select-sm" multiple size="3" style="min-width: 320px; max-width: 420px;"></select>
            <a href="/" class="btn btn-sm btn-outline-light">Назад к камере</a>
        </div>
    </div>

    <div id="export-bar" class="dashboard-card p-2 mb-3 d-flex gap-2 align-items-center" style="display:none;">
        <span class="me-2">Экспорт:</span>
        <a id="export-csv" class="btn btn-sm btn-outline-primary" href="#">CSV</a>
        <a id="export-json" class="btn btn-sm btn-outline-primary" href="#">JSON</a>
        <small class="ms-2 text-muted">(берётся первая выбранная сессия)</small>
    </div>

    <div id="charts-wrap" class="row g-3">
        <div class="col-md-6"><div class="dashboard-card p-3"><canvas id="chart-posture"></canvas></div></div>
        <div class="col-md-6"><div class="dashboard-card p-3"><canvas id="chart-blink"></canvas></div></div>
        <div class="col-md-6"><div class="dashboard-card p-3"><canvas id="chart-perclos"></canvas></div></div>
        <div class="col-md-6"><div class="dashboard-card p-3"><canvas id="chart-breath"></canvas></div></div>
        <div class="col-12"><div class="dashboard-card p-3"><canvas id="chart-emotion" style="max-height: 220px;"></canvas></div></div>
    </div>

    <div id="empty-state" class="text-center py-5" style="color: white; display:none;">
        <p>Нет сохранённых данных. Запустите камеру на главной странице.</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const PALETTE = ['#dc3545', '#007bff', '#28a745', '#fd7e14', '#6f42c1'];
let charts = {};

function destroyCharts() {
    Object.values(charts).forEach(c => c && c.destroy());
    charts = {};
}

function makeMultiLineChart(id, label, datasets, labels) {
    const ctx = document.getElementById(id).getContext('2d');
    return new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
            responsive: true,
            plugins: { title: { display: true, text: label } },
            scales: { x: { ticks: { maxTicksLimit: 8 } } },
        },
    });
}

function buildLineDatasets(seriesList, key, labelFmt) {
    return seriesList.map((s, i) => ({
        label: labelFmt(s),
        data: s.samples.map(x => x[key]),
        borderColor: PALETTE[i % PALETTE.length],
        backgroundColor: PALETTE[i % PALETTE.length] + '22',
        tension: 0.25,
        pointRadius: 0,
        spanGaps: true,
    }));
}

function emotionDistribution(samples) {
    const c = {};
    samples.forEach(s => { if (s.emotion) c[s.emotion] = (c[s.emotion] || 0) + 1; });
    return c;
}

function renderSeries(seriesList) {
    destroyCharts();
    if (!seriesList.length || seriesList.every(s => !s.samples.length)) {
        document.getElementById('charts-wrap').style.display = 'none';
        document.getElementById('empty-state').style.display = '';
        document.getElementById('export-bar').style.display = 'none';
        return;
    }
    document.getElementById('charts-wrap').style.display = '';
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('export-bar').style.display = '';

    const longest = seriesList.reduce((a, b) => b.samples.length > a.samples.length ? b : a);
    const labels = longest.samples.map(s => new Date(s.ts).toLocaleTimeString('ru-RU'));

    const fmt = s => `Сессия #${s.id}`;
    charts.posture = makeMultiLineChart('chart-posture', 'Угол осанки (°)',
        buildLineDatasets(seriesList, 'posture_angle', fmt), labels);
    charts.blink = makeMultiLineChart('chart-blink', 'Моргания (в мин)',
        buildLineDatasets(seriesList, 'blink_rate', fmt), labels);
    charts.perclos = makeMultiLineChart('chart-perclos', 'PERCLOS (%)',
        buildLineDatasets(seriesList, 'perclos', fmt), labels);
    charts.breath = makeMultiLineChart('chart-breath', 'Дыхание (циклов/мин)',
        buildLineDatasets(seriesList, 'breath_rate', fmt), labels);

    const allEmotions = new Set();
    const distros = seriesList.map(s => emotionDistribution(s.samples));
    distros.forEach(d => Object.keys(d).forEach(k => allEmotions.add(k)));
    const emoLabels = [...allEmotions];
    const emoDatasets = distros.map((d, i) => ({
        label: fmt(seriesList[i]),
        data: emoLabels.map(k => d[k] || 0),
        backgroundColor: PALETTE[i % PALETTE.length],
    }));
    const ctx = document.getElementById('chart-emotion').getContext('2d');
    charts.emotion = new Chart(ctx, {
        type: 'bar',
        data: { labels: emoLabels, datasets: emoDatasets },
        options: { responsive: true, plugins: { title: { display: true, text: 'Распределение эмоций' } } },
    });

    const first = seriesList[0];
    document.getElementById('export-csv').href = `/api/export/${first.id}/?format=csv`;
    document.getElementById('export-json').href = `/api/export/${first.id}/?format=json`;
}

async function loadSession(id) {
    const r = await fetch(`/api/history/?session_id=${id}`);
    const d = await r.json();
    return { id, samples: d.samples || [] };
}

async function refreshSelection() {
    const select = document.getElementById('session-multi');
    const ids = Array.from(select.selectedOptions).map(o => o.value).slice(0, 3);
    if (!ids.length) {
        renderSeries([]);
        return;
    }
    const series = await Promise.all(ids.map(loadSession));
    renderSeries(series);
}

async function loadSessions() {
    const r = await fetch('/api/sessions/');
    const d = await r.json();
    const select = document.getElementById('session-multi');
    select.innerHTML = '';
    d.sessions.forEach((s, i) => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `#${s.id} · ${new Date(s.started_at).toLocaleString('ru-RU')} · ${s.samples} замеров`;
        if (i === 0) opt.selected = true;
        select.appendChild(opt);
    });
    if (d.sessions.length) refreshSelection();
    else renderSeries([]);
}

document.getElementById('session-multi').addEventListener('change', refreshSelection);
loadSessions();
</script>
{% endblock %}
