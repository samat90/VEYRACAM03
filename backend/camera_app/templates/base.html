<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeyraCam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { height: 100%; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            color: #1a1a2e;
        }
        .dashboard-card {
            background: rgba(255, 255, 255, 0.95);
            color: #1a1a2e;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
        }
        .metric-value { font-size: 1.6rem; font-weight: bold; line-height: 1.1; }
        .metric-card { padding: 0.75rem !important; }
        .metric-card h6 {
            margin-bottom: 0.2rem;
            font-size: 0.8rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .metric-card small { font-size: 0.72rem; color: #666; }
        .good { color: #28a745; }
        .warning { color: #ffc107; }
        .danger { color: #dc3545; }

        .top-nav {
            padding: 0.35rem 1rem;
            background: rgba(0, 0, 0, 0.35);
        }
        .top-nav .brand { color: white; font-weight: 600; letter-spacing: 0.5px; }
        .top-nav .brand a { color: white; }
        .top-nav .meta { color: rgba(255, 255, 255, 0.9); font-size: 0.85rem; }

        .main-wrap { height: calc(100vh - 46px); padding: 0.75rem; overflow: auto; }
        body[data-page="index"] .main-wrap { overflow: hidden; }

        .video-card { padding: 0.75rem; height: 100%; display: flex; flex-direction: column; }
        .video-box {
            position: relative;
            flex: 1 1 auto;
            min-height: 0;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
        }
        #video, #overlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            transform: scaleX(-1);
        }
        #overlay { pointer-events: none; }

        .controls { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }
        .controls .btn { flex: 1 1 0; padding: 0.45rem 0.5rem; font-size: 0.92rem; min-width: 100px; }

        .side-col {
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            overflow-y: auto;
            padding-right: 4px;
        }
        .side-col::-webkit-scrollbar { width: 6px; }
        .side-col::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 3px; }
        .metric-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; }
        .metric-grid .metric-value { font-size: 1.25rem; }
        .metric-grid .metric-card { padding: 0.5rem !important; }

        .advice-card {
            background: rgba(255, 255, 255, 0.95);
            border-left: 4px solid #17a2b8;
            color: #1a1a2e;
            padding: 0.6rem 0.9rem;
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
            flex-shrink: 0;
        }
        .advice-card .label {
            color: #17a2b8;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        .advice-card p { margin: 0; font-size: 0.95rem; }
        .advice-card .btn-outline-light {
            color: #17a2b8;
            border-color: #17a2b8;
        }
        .advice-card .btn-outline-light:hover {
            background-color: #17a2b8;
            color: #fff;
        }
        .advice-card.severity-0 { border-left-color: #28a745; }
        .advice-card.severity-0 .label { color: #28a745; }
        .advice-card.severity-1 { border-left-color: #17a2b8; }
        .advice-card.severity-2 { border-left-color: #ffc107; }
        .advice-card.severity-2 .label { color: #d39e00; }
        .advice-card.severity-3 { border-left-color: #dc3545; }
        .advice-card.severity-3 .label { color: #dc3545; }

        .badge { font-size: 0.72rem; }

        .calibration-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 15, 40, 0.72);
            color: white;
            border-radius: 10px;
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body>
    <nav class="top-nav d-flex justify-content-between align-items-center">
        <div class="brand">
            <a href="/" class="text-white text-decoration-none">VeyraCam</a>
        </div>
        <div class="meta d-flex gap-3 align-items-center">
            {% block top_meta %}{% endblock %}
        </div>
    </nav>

    <div class="main-wrap">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
